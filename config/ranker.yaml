version: "v1"

# Minimum keyword pre-score to proceed to LLM ranking (Pass 1 threshold).
# Jobs below this get fit_score = pre_score, fit_confidence = "low".
pre_score_threshold: 3.0

# --- Scoring rubric (baked into the system prompt) ---
scoring_rubric: |
  Score 0–10. Use this rubric:
    9–10: Near-perfect match — the candidate's core skills are the job's requirements; little
          ramp-up needed.
     7–8: Strong match — most core skills present; one or two gaps are learnable quickly.
     5–6: Partial match — some relevant skills; significant gaps or seniority mismatch.
     3–4: Weak match — domain is right but skills are misaligned or the role is too senior.
     1–2: Poor match — only tangential relevance.
       0: No match.

  Penalise heavily for:
  - Any 'title_excludes' term appearing in the job title (e.g. "Senior", "Lead").
  - Any 'description_excludes' term in the JD (e.g. "SC clearance required").
  - Required years of experience > profile.filters.requires_years_above.
  - Company in profile.negative_signals.company_blocklist.

  Bonus for:
  - Salary above profile.filters.salary_floor_gbp.
  - Location within profile.search_radius_miles or remote.
  - Exact match to a core target role.

# --- Prompt template ---
# {domain_context} is replaced with the active domain pack's ranker_context.
# {profile_json} is replaced with a compact JSON summary of the candidate profile.
# {jobs_json} is replaced with an array of up to 5 cleaned JDs.
system_prompt_template: |
  You are an expert job-match ranker for UK roles. You will be given a candidate profile
  and one or more job descriptions. For each job, output a JSON object.

  CANDIDATE PROFILE:
  {profile_json}

  SCORING RUBRIC:
  {scoring_rubric}

  {domain_context}

  OUTPUT FORMAT — respond with a JSON array, one object per job, in the same order received.
  Use ONLY these short keys to minimise tokens:
    s  — fit_score (float 0–10, one decimal place)
    c  — fit_confidence (float 0–1, two decimal places)
    r  — fit_reason (one sentence, max 20 words, no preamble)
    k  — matched_keywords (JSON array of strings, max 5 items)

  Example output for two jobs:
  [
    {"s": 8.2, "c": 0.85, "r": "FPGA + SoC validation align closely with core skills.", "k": ["FPGA", "RTL", "SystemVerilog"]},
    {"s": 3.1, "c": 0.60, "r": "Role requires 5+ years; candidate has 1.", "k": ["Python"]}
  ]

  Respond with the JSON array only. No markdown, no preamble, no trailing text.
  Max tokens: 200 per job.

user_prompt_template: |
  Rate the following {n} job(s):
  {jobs_json}

# Compact output schema (for documentation / prompt validation)
output_schema:
  type: array
  items:
    type: object
    required: [s, c, r, k]
    properties:
      s: {type: number, minimum: 0, maximum: 10}
      c: {type: number, minimum: 0, maximum: 1}
      r: {type: string, maxLength: 200}
      k: {type: array, items: {type: string}, maxItems: 5}
