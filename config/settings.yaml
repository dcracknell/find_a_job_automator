# === Email / digest ===
# Set mode to 'passive' or add SMTP secrets to enable email digests.
# Without SMTP secrets the pipeline still runs and saves jobs.xlsx.
email:
  smtp_host: "${SMTP_HOST}"
  smtp_port: 587
  smtp_user: "${SMTP_USER}"
  smtp_pass: "${SMTP_PASS}"
  smtp_from: "${SMTP_FROM}"
  smtp_to: "${SMTP_TO}"
  use_tls: true


# === Output paths (relative to project root) ===
paths:
  db: data/jobs.db
  xlsx: data/jobs.xlsx
  quota_log: data/quota.jsonl
  runs_log: data/runs.log
  backups: data/backups
  cache: data/cache
  dashboard_html: data/dashboard.html


# === Logging ===
log_level: INFO

# === Pipeline behaviour ===
dry_run: false  # override at runtime with --dry-run flag

# active: full pipeline, email digest, dashboard regenerated
# passive: weekly digest of score-9+ jobs only; no email for lower scores
# paused: skip every run entirely (useful during holidays)
mode: passive   # no email sent without SMTP credentials


# === Quota / cost control ===
quota_soft_cap_gbp: 2.00  # daily spend threshold; logs warning when exceeded

# === Heartbeat email ===
heartbeat:
  # Send a "system is alive but quiet" email after this many consecutive zero-job runs.
  trigger_after_n_quiet_runs: 3
  # Suppress further heartbeats for this many days after sending one.
  suppress_days: 7

# === Stale-row housekeeping ===
stale_job_days: 14  # set status=closed if last_seen > today - N days and status=new

# === Backups ===
backups:
  keep_days: 7  # rolling window of daily DB + xlsx backups

# === Model selection and per-token cost rates ===
# Model IDs and rates are defined here so code never hard-codes them.
# Update rates when Anthropic pricing changes - the quota tracker reads them.
models:
  parse_cv:
    model: claude-sonnet-4-6
    input_gbp_per_million: 2.40
    output_gbp_per_million: 12.00
    cached_input_gbp_per_million: 0.24
    max_tokens_response: 4096
  rank:
    model: claude-sonnet-4-6
    input_gbp_per_million: 2.40
    output_gbp_per_million: 12.00
    cached_input_gbp_per_million: 0.24
    max_jd_tokens: 1500
    batch_size: 5
    max_tokens_response: 1500
  queries:
    use_claude: true
    model: claude-sonnet-4-6
    input_gbp_per_million: 2.40
    output_gbp_per_million: 12.00
    cached_input_gbp_per_million: 0.24
    max_tokens_response: 700
    max_queries: 20
  extract_closing_date:
    model: claude-haiku-4-5
    input_gbp_per_million: 0.64
    output_gbp_per_million: 3.20
    cached_input_gbp_per_million: 0.064
    max_tokens_response: 64
