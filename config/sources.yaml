apis:
  adzuna:
    enabled: auto    # runs when ADZUNA_APP_ID + ADZUNA_APP_KEY are configured
    country: gb
    results_per_query: 20
  reed:
    enabled: auto    # runs when REED_API_KEY is configured
  gov_uk_find_a_job:
    enabled: false

# Wraps python-jobspy. Off by default - bot detection on these sites means results
# can be inconsistent. Enable when structured APIs aren't producing enough volume.
jobspy:
  enabled: true
      sites: [indeed, linkedin, google]
  country: uk
  results_wanted_per_query: 20
  proxies: []

aggregators:
  hn_hiring:
    enabled: false

