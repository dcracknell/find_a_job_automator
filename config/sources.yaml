apis:
  adzuna:
    enabled: auto
    country: gb
    results_per_query: 50        # raised from 20 — fetch more per query
  reed:
    enabled: auto
  gov_uk_find_a_job:
    enabled: true                # enabled — lists PhD studentships, research posts, public sector

jobspy:
  enabled: true
  sites: [indeed, google]  # removed linkedin to avoid 429 rate-limit hangs
  country: uk
  results_wanted_per_query: 50  # raised from 20
  proxies: []

aggregators:
  hn_hiring:
    enabled: true               # enabled — good for AI/tech startups

