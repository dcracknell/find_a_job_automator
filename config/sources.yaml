apis:
  adzuna:
    enabled: false   # requires ADZUNA_APP_ID + ADZUNA_APP_KEY
    country: gb
    results_per_query: 50
  reed:
    enabled: false   # requires REED_API_KEY
  gov_uk_find_a_job:
    enabled: false

# Wraps python-jobspy. Off by default - bot detection on these sites means results
# can be inconsistent. Enable when structured APIs aren't producing enough volume.
jobspy:
  enabled: false
  sites: [indeed, linkedin, glassdoor, google, zip_recruiter]
  country: uk
  results_wanted_per_query: 25
  proxies: []

aggregators:
  hn_hiring:
    enabled: false

# These ATS sources are completely free - no API keys needed.
ats:
  greenhouse:
    companies:
      - {name: Graphcore, slug: graphcore}
      - {name: Cerebras, slug: cerebras}
  lever:
    companies:
      - {name: SiFive, slug: sifive}
  workday:
    companies:
      - {name: Arm, url: "https://arm.wd3.myworkdayjobs.com/Careers"}
      - {name: Dyson, url: "https://careers.dyson.com/en-gb/wday/cxs/dyson/dysonext/jobs"}
