name: legal
display_name: "Legal (Solicitors, Barristers, Paralegals)"

recommended_sources:
  enable_by_default:
    - adzuna
    - reed
    - gov_uk_find_a_job
  disable_by_default:
    - nhs_jobs
    - civil_service
    - tes
    - caterer
    - mandy
    - hn_hiring
    - findaphd

domain_adapters: {}

salary:
  default_unit: annual_gbp
  also_parse: []
  agenda_for_change_bands: false

seniority_words:
  junior: [trainee, paralegal, legal assistant, nq, newly qualified, apprentice]
  mid: [solicitor, associate, 1-3 pqe, 2-4 pqe, 3-5 pqe, in-house counsel]
  senior: [senior associate, partner, senior partner, gc, general counsel, head of legal, legal director]
  exclude_above_default: mid

closing_date_patterns:
  - "closing date[:\\s]+([^\\n]+)"
  - "applications close[:\\s]+([^\\n]+)"
  - "deadline[:\\s]+([^\\n]+)"
  - "apply by[:\\s]+([^\\n]+)"

ranker_context: |
  This is a legal role search. Pay attention to:
  - PQE (Post-Qualified Experience) requirements — "3+ PQE" means 3+ years since qualification
  - NQ (Newly Qualified) vs mid-level vs senior solicitor distinction
  - Practice area match: corporate, commercial, litigation, employment, real estate, IP, TMT, etc.
  - Firm type: Magic Circle, Silver Circle, US firm, regional firm, boutique, in-house
  - SRA registration required for qualified solicitor roles
  - Barrister (Bar) vs solicitor (SRA) qualification is distinct — don't conflate
  - Legal aid vs commercial work distinction

cv_parser_context: |
  Extract: SRA number (if qualified), call to the Bar date (if barrister), qualification year,
  training contract seats, practice areas, notable transactions or cases (anonymised if
  needed), law firm names and tiers, in-house experience, academic qualifications (LLB, GDL,
  LPC, SQE), language skills. Do not infer PQE level not stated explicitly.
  Use only facts present in the provided CV; do not invent or infer experience.

example_skills:
  core: ["contract drafting", "legal research", "due diligence", "litigation", "client management"]
  adjacent: ["M&A", "employment law", "commercial contracts", "IP", "data protection / GDPR"]

example_target_roles:
  core: ["Trainee Solicitor", "Paralegal", "NQ Solicitor", "Legal Adviser"]
  adjacent: ["Legal Executive", "In-House Counsel", "Commercial Solicitor", "Employment Solicitor"]
  stretch: ["Senior Associate", "Associate", "Legal Manager"]
