name: Configure Job Search Profile

"on":
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number from a Job search profile setup issue"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: configure-job-search-profile
  cancel-in-progress: false

jobs:
  configure-profile:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.title, 'Job search profile setup') ||
      contains(github.event.issue.body, '### CV text')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e .

      - name: Fetch issue body
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$ISSUE_NUMBER" ]]; then
            echo "ISSUE_NUMBER is required."
            exit 1
          fi
          gh issue view "$ISSUE_NUMBER" --json body --jq .body > issue_body.md

      - name: Build profile from issue
        shell: bash
        run: |
          set -euo pipefail
          job-search profile-from-issue issue_body.md

      - name: Commit updated profile
        id: commit-profile
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add config/profile.json

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No profile changes to commit."
            exit 0
          fi

          git commit -m "Update job search profile from issue #$ISSUE_NUMBER"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Start job search run
        if: success()
        id: start-search
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run daily_run.yml --ref "$GITHUB_REF_NAME"

      - name: Comment on issue
        if: success()
        shell: bash
        env:
          PROFILE_CHANGED: ${{ steps.commit-profile.outputs.changed }}
          SEARCH_STARTED: ${{ steps.start-search.outcome }}
        run: |
          set -euo pipefail
          if [[ "$PROFILE_CHANGED" == "true" ]]; then
            message="Updated \`config/profile.json\` from this issue."
          else
            message="Profile workflow completed, but \`config/profile.json\` did not change."
          fi
          if [[ "$SEARCH_STARTED" == "success" ]]; then
            message="$message Started the Daily Job Search workflow."
          else
            message="$message You can start the Daily Job Search workflow from the Actions tab."
          fi
          gh issue comment "$ISSUE_NUMBER" --body "$message"

      - name: Close issue
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          gh issue close "$ISSUE_NUMBER" --reason completed

      - name: Comment on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          gh issue comment "$ISSUE_NUMBER" --body "Profile setup failed. Check the Configure Job Search Profile workflow logs."
