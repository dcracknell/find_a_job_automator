name: Daily Job Search

on:
  schedule:
      - cron: '0 7 * * *'   # 07:00 UTC every day
        workflow_dispatch:       # allow manual runs from the Actions tab

        jobs:
          run-pipeline:
              runs-on: ubuntu-latest

                  steps:
                        - name: Checkout repository
                                uses: actions/checkout@v4

                                      - name: Set up Python
                                              uses: actions/setup-python@v5
                                                      with:
                                                                python-version: '3.12'

                                                                      - name: Install uv
                                                                              run: pip install uv

                                                                                    - name: Install dependencies
                                                                                            run: uv pip install --system -e .

                                                                                                  - name: Restore persistent data
                                                                                                          uses: actions/cache@v4
                                                                                                                  with:
                                                                                                                            path: data/
                                                                                                                                      key: job-data-${{ github.run_id }}
                                                                                                                                                restore-keys: |
                                                                                                                                                            job-data-
                                                                                                                                                            
                                                                                                                                                                  - name: Write .env from secrets
                                                                                                                                                                          run: |
                                                                                                                                                                                    cat > .env <<'EOF'
                                                                                                                                                                                              ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
                                                                                                                                                                                                        ADZUNA_APP_ID=${{ secrets.ADZUNA_APP_ID }}
                                                                                                                                                                                                                  ADZUNA_APP_KEY=${{ secrets.ADZUNA_APP_KEY }}
                                                                                                                                                                                                                            REED_API_KEY=${{ secrets.REED_API_KEY }}
                                                                                                                                                                                                                                      SMTP_HOST=${{ secrets.SMTP_HOST }}
                                                                                                                                                                                                                                                SMTP_USER=${{ secrets.SMTP_USER }}
                                                                                                                                                                                                                                                          SMTP_PASS=${{ secrets.SMTP_PASS }}
                                                                                                                                                                                                                                                                    SMTP_FROM=${{ secrets.SMTP_FROM }}
                                                                                                                                                                                                                                                                              SMTP_TO=${{ secrets.SMTP_TO }}
                                                                                                                                                                                                                                                                                        EOF
                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                              - name: Run migrations
                                                                                                                                                                                                                                                                                                      run: job-search migrate
                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                            - name: Run pipeline
                                                                                                                                                                                                                                                                                                                    run: job-search run
                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                          - name: Upload jobs workbook as artifact
                                                                                                                                                                                                                                                                                                                                  if: always()
                                                                                                                                                                                                                                                                                                                                          uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                                                                                                                            name: jobs-xlsx-${{ github.run_number }}
                                                                                                                                                                                                                                                                                                                                                                      path: data/jobs.xlsx
                                                                                                                                                                                                                                                                                                                                                                                if-no-files-found: ignore
                                                                                                                                                                                                                                                                                                                                                                                          retention-days: 30
                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                - name: Upload run log as artifact
                                                                                                                                                                                                                                                                                                                                                                                                        if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                                                                  name: run-log-${{ github.run_number }}
                                                                                                                                                                                                                                                                                                                                                                                                                                            path: data/runs.log
                                                                                                                                                                                                                                                                                                                                                                                                                                                      if-no-files-found: ignore
                                                                                                                                                                                                                                                                                                                                                                                                                                                                retention-days: 14
